name: Cognitive Banking CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # 1. Build & Test Spring Boot App (DEV profile)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & Run Tests (dev profile)
        run: mvn clean verify -Pdev
        env:
          SPRING_PROFILES_ACTIVE: dev

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports

  # 2. Build & Push Docker Image (STAGING profile)
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image (docker profile)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            fulufhelom/cognitive-banking-application:latest
            fulufhelom/cognitive-banking-application:${{ github.sha }}
        env:
          SPRING_PROFILES_ACTIVE: docker
      - name: Run Docker Compose (staging stack)
        run: docker-compose -f docker-compose.yml up -d

