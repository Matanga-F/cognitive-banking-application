# Main compose file (references all)

# Include all services
include:
  - docker-compose.base.yml
  - docker-compose.dev.yml
  - docker-compose.monitoring.yml

# Networks and Volumes (defined here to avoid duplication)
networks:
  bank-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: bank-net
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  postgres_data:
    driver: local
    name: cognitive-bank-postgres-data-${ENVIRONMENT:-dev}
  redis_data:
    driver: local
    name: cognitive-bank-redis-data-${ENVIRONMENT:-dev}
  prometheus_data:
    driver: local
    name: cognitive-bank-prometheus-data-${ENVIRONMENT:-dev}
  grafana_data:
    driver: local
    name: cognitive-bank-grafana-data-${ENVIRONMENT:-dev}