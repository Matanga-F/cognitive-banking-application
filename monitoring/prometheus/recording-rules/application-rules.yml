groups:
  - name: application_recording_rules
    interval: 1m
    rules:
      - record: application:request_rate:1m
        expr: sum(rate(http_server_requests_seconds_count[1m]))

      - record: application:error_rate:1m
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) 
          / 
          sum(rate(http_server_requests_seconds_count[1m]))

      - record: application:avg_response_time:1m
        expr: |
          sum(rate(http_server_requests_seconds_sum[1m])) 
          / 
          sum(rate(http_server_requests_seconds_count[1m]))