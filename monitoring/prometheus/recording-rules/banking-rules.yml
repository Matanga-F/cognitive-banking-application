groups:
  - name: banking_recording_rules
    interval: 1m
    rules:
      # API request rate
      - record: banking:api_request_rate:1m
        expr: rate(http_server_requests_seconds_count[1m])

      # API error rate
      - record: banking:api_error_rate:1m
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[1m])

      # Average transaction amount
      - record: banking:transaction_avg_amount:5m
        expr: avg_over_time(banking_transaction_amount_summary_sum[5m]) / avg_over_time(banking_transaction_amount_summary_count[5m])

      # Database query rate
      - record: banking:db_query_rate:1m
        expr: rate(hibernate_query_execution_seconds_count[1m])

      # Cache hit ratio
      - record: banking:cache_hit_ratio:5m
        expr: sum(rate(cache_hits_total[5m])) / (sum(rate(cache_hits_total[5m])) + sum(rate(cache_misses_total[5m])))