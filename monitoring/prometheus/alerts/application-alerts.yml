groups:
  - name: application_alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m]) 
          / 
          rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.method }} {{ $labels.uri }}"

      # Slow response time alert
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95, 
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le, uri, method)
          ) > 2
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "Slow response time detected"
          description: "95th percentile response time for {{ $labels.method }} {{ $labels.uri }} is {{ $value }}s"

      # Low request rate alert
      - alert: LowTraffic
        expr: |
          sum(rate(http_server_requests_seconds_count[10m])) < 10
        for: 15m
        labels:
          severity: info
          component: application
        annotations:
          summary: "Low traffic detected"
          description: "Request rate is {{ $value }} requests per second"