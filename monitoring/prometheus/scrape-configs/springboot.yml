# Spring Boot Actuator metrics scraping
- job_name: 'spring-boot-app'
  metrics_path: '/actuator/prometheus'
  scrape_interval: 15s
  scrape_timeout: 10s
  static_configs:
    - targets:
        - 'host.docker.internal:8080'  # Local development
        - 'cognitive-bank:8080'         # Docker service name
      labels:
        application: 'cognitive-banking'
        environment: 'development'
        component: 'backend'