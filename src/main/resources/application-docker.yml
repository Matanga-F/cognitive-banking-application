spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:cognitive_bank}
    username: ${DB_USERNAME:desta}
    password: ${DB_PASSWORD:C0g1n1tiv5B@nk}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

jwt:
  secret: ${JWT_SECRET:8iX+TfNHmbGXNxJ7MYlKY0QhTDB5F7DNCh0SPoI9hR0=}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

logging:
  level:
    root: INFO
    com.cognitive.banking: DEBUG

management:
  health:
    redis:
      enabled: true

banking:
  features:
    enable-mock-payments: true
    enable-email-notifications: false