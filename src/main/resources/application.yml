spring:
  application:
    name: cognitive-banking-application

  main:
    allow-bean-definition-overriding: true

  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: 30s

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    default-encoding: UTF-8

  data:
    redis:
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  datasource:
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: ${HIBERNATE_STATS:false}
    show-sql: ${JPA_SHOW_SQL:false}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/cognitive/bank
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: ${TOMCAT_MIN_SPARE:10}
    accesslog:
      enabled: true
      pattern: '%h %l %u %t "%r" %s %b %D'

jwt:
  secret: ${JWT_SECRET:8iX+TfNHmbGXNxJ7MYlKY0QhTDB5F7DNCh0SPoI9hR0=}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
      path-mapping:
        prometheus: prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 1m
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:unknown}
      instance: ${HOSTNAME:localhost}
  health:
    db:
      enabled: true
    redis:
      enabled: true

banking:
  metrics:
    enabled: true
    transaction:
      detailed: true
    security:
      track-failed-logins: true
      failed-login-window: 5m
    cache:
      hit-ratio-threshold: 0.8
    rate-limiting:
      enabled: true
      default-limit: 100
      default-duration: 60

logging:
  level:
    root: INFO
    com.cognitive.banking: DEBUG
  file:
    name: logs/cognitive-banking.log
    max-size: 100MB
    max-history: 30

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

cache:
  ttl:
    users: 300
    accounts: 300
    transactions: 60
    rates: 3600
  max-size:
    users: 1000
    accounts: 1000

resilience4j:
  retry:
    instances:
      database:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.dao.DataAccessException